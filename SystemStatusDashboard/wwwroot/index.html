<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <title>PC Monitor</title>
</head>
<body>
    <h1>CPU/GPU Monitor</h1>

    <div class="container-md">
        <canvas id="statsChart"></canvas>
    </div>

   
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>


    <script>
        const labels = new Array(60).fill('');
        const cpuData = new Array(60).fill(0);
        const gpuData = new Array(60).fill(0);

        const chart = new Chart(document.getElementById('statsChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'CPU %',
                        data: cpuData,
                        borderColor: 'red',
                        backgroundColor: 'rgba(255,0,0,0.05)',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.3,
                        fill: true,
                    },
                    {
                        label: 'GPU %',
                        data: gpuData,
                        borderColor: 'royalblue',
                        backgroundColor: 'rgba(65,105,225,0.05)',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.3,
                        fill: true,
                    }
                ]
            },
            options: {
                animation: true,
                responsive: true,
                scales: {
                    y: {
                        min: 0,
                        max: 100,
                        ticks: { callback: val => val + '%' }
                    },
                    x: { display: false }
                },
                plugins: {
                    legend: { position: 'top' }
                }
            }
        });

        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/monitorHub")
            .build();

        connection.on("ReceiveStats", (data) => {
            cpuData.push(data.cpuUsage);
            cpuData.shift();
            gpuData.push(data.gpuUsage);
            gpuData.shift();

            chart.update('update'); 
        });

        connection.start()
            .then(() => console.log("SignalR connected"))
            .catch(console.error);

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
</body>
</html>
